<head>

    <div class="mb-4 bg-gray-50 p-3 rounded-lg border border-dashed border-gray-300">
      <label class="block text-xs font-semibold text-gray-500 mb-1"><i class="fa-solid fa-paperclip mr-1"></i> 附加 PDF 講義 (限制 2MB 內)</label>
      <input type="file" id="notePdfFile" accept="application/pdf" class="w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
    </div>

      <button id="btn-cancel-note" class="flex-1 border py-2 rounded-xl text-sm">取消</button>

<div id="toast" class="fixed bottom-5 right-5 bg-gray-900 text-white text-xs px-4 py-2 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50"></div>

<script>
let wordsData = JSON.parse(localStorage.getItem('hub_words_data')) || [];
let videosData = JSON.parse(localStorage.getItem('hub_videos_data')) || [];
let foldersData = JSON.parse(localStorage.getItem('hub_folders_data')) || [{id: 'f1', name: '基礎發音筆記', notes: [{title: '發音要訣', content: '記得練習連音與氣流強度。'}]}];
let currentFolderId = null;
let svcWorkerReg = null;

const INTERVALS = [
    1 * 24 * 60 * 60 * 1000,
    3 * 24 * 60 * 60 * 1000,
    7 * 24 * 60 * 60 * 1000,
    15 * 24 * 60 * 60 * 1000
]; 

window.onload = function() {
    initTabs();
    renderWords();
    renderVideos();
    renderFolders();
    initDictionarySearch();
    registerServiceWorker();
    checkNotificationPermission();
};

function registerServiceWorker() {
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(reg => {
            svcWorkerReg = reg;
            console.log('Service Worker 註冊成功');
        }).catch(err => console.log('Service Worker 註冊失敗:', err));
    }
}

function checkNotificationPermission() {
    if ('Notification' in window) {
        if (Notification.permission === 'default') {
            document.getElementById('btn-request-auth').classList.remove('hidden');
        }
    }
}

function requestNotificationPermission() {
    if ('Notification' in window) {
        Notification.requestPermission().then(permission => {
            if (permission === 'granted') {
                showToast('🔔 成功開啟遺忘曲線通知功能！');
                document.getElementById('btn-request-auth').classList.add('hidden');
            }
        });
    }
}

function scheduleNotification(word, delayMs) {
    if (navigator.serviceWorker.controller && Notification.permission === 'granted') {
        navigator.serviceWorker.controller.postMessage({
            type: 'SET_REMINDER',
            word: word,
            delayMs: delayMs
        });
    }
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    if(toast) {
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }
}

function openDictionary(word) {
    if (!word) return;
    const cleanWord = word.trim().toLowerCase();
    const url = `https://tw.dictionary.search.yahoo.com/search?p=${encodeURIComponent(cleanWord)}`;
    window.open(url, '_blank');
}

function initDictionarySearch() {
    const searchInput = document.getElementById('vocabSearch');
    if (searchInput) {
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchDictionaryFromInput();
        });
    }
}

function searchDictionaryFromInput() {
    const query = document.getElementById('vocabSearch').value.trim();
    if (!query) return alert('請輸入要查詢的單字！');
    openDictionary(query);
}

function initTabs() {
    const tabs = [
        { btn: 'tab-vocab', page: 'page-vocab' },
        { btn: 'tab-video', page: 'page-video' },
        { btn: 'tab-notes', page: 'page-notes' },
        { btn: 'tab-flashcard', page: 'page-flashcard' }
    ];
    tabs.forEach(tab => {
        const btnEl = document.getElementById(tab.btn);
        if(btnEl) {
            btnEl.addEventListener('click', () => {
                tabs.forEach(t => {
                    document.getElementById(t.page).style.display = 'none';
                    document.getElementById(t.btn).classList.remove('active');
                });
                document.getElementById(tab.page).style.display = 'block';
                btnEl.classList.add('active');
                if(tab.btn === 'tab-flashcard') initFlashcards();
            });
        }
    });
    document.getElementById('tab-vocab').click();
}

document.getElementById('btn-add-word').onclick = function() {
    const input = document.getElementById('wordInput');
    const word = input.value.trim();
    if(!word) return alert('請輸入單字');
    
    const todayStr = new Date().toLocaleDateString('zh-TW');
    
    wordsData.unshift({ 
        word, 
        date: todayStr,
        stage: 0,
        nextReviewTime: Date.now() + INTERVALS[0] 
    });
    localStorage.setItem('hub_words_data', JSON.stringify(wordsData));
    
    scheduleNotification(word, INTERVALS[0]);
    renderWords();
    showToast(`🚀 已收錄並排定提醒：${word}`);
    input.value = '';
};

function renderWords() {
    const container = document.getElementById('dateFoldersContainer');
    if (!container) return;
    container.innerHTML = '';
    
    const groups = {};
    wordsData.forEach(w => {
        if(!groups[w.date]) groups[w.date] = [];
        groups[w.date].push(w);
    });
    
    const sortedDates = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));
    if(sortedDates.length === 0) {
        container.innerHTML = '<p class="text-xs text-gray-400 text-center py-10">目前單字本空空如也。</p>';
        return;
    }
    
    sortedDates.forEach(date => {
        let cardsHtml = groups[date].map(item => {
            const gIdx = wordsData.findIndex(w => w.word === item.word && w.date === item.date);
            // 🎯 修正第 322 行：計算單字建立到現在過了幾小時，少於 24 小時才是新單字！
            const hoursPassed = (new Date().getTime() - new Date(item.date).getTime()) / (1000 * 60 * 60);
            const stageText = hoursPassed < 24 ? '新單字' : `階段 ${item.stage || 0}`;
            return `
                <div class="flex justify-between items-center bg-white p-3 rounded-lg border border-gray-100 mb-2 shadow-sm">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-gray-900">${item.word}</span>
                        <span class="text-[10px] bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded">${stageText}</span>
                        <button onclick="speak('${item.word}')" class="text-indigo-500 hover:text-indigo-700 text-xs"><i class="fa-solid fa-volume-high"></i></button>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="openDictionary('${item.word}')" class="text-[11px] bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 px-2.5 py-1 rounded font-semibold transition flex items-center gap-1">
                            <i class="fa-solid fa-book-open text-[10px]"></i>奇摩字典
                        </button>
                        <button onclick="deleteWord(${gIdx})" class="text-gray-300 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
            `;
        }).join('');
        
        container.innerHTML += `
            <details open class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                <summary class="bg-indigo-50/30 px-4 py-2 font-semibold text-gray-700 text-xs flex justify-between items-center cursor-pointer select-none">
                    <span><i class="fa-solid fa-folder text-amber-500 mr-1"></i> ${date}</span>
                    <span class="bg-indigo-200 text-indigo-800 px-2 py-0.5 rounded-full text-[10px]">${groups[date].length} 個單字</span>
                </summary>
                <div class="p-3 border-t border-gray-100 bg-gray-50/50">${cardsHtml}</div>
            </details>
        `;
    });
}

function deleteWord(idx) {
    wordsData.splice(idx, 1);
    localStorage.setItem('hub_words_data', JSON.stringify(wordsData));
    renderWords();
}

function speak(text) {
    const su = new SpeechSynthesisUtterance(text);
    su.lang = 'en-US';
    window.speechSynthesis.speak(su);
}

// ------ YouTube 播放與筆記儲存邏輯 ------
document.getElementById('btn-load-video').onclick = function() {
    const url = document.getElementById('videoUrlInput').value.trim();
    if(!url) return alert('請貼上網址');
    
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = url.match(regExp);
    
    if (match && match[2].length === 11) {
        const videoId = match[2];
        document.getElementById('videoPlayer').src = `https://www.youtube.com/embed/${videoId}`;
        document.getElementById('videoArea').classList.remove('hidden');
    } else {
        alert('這好像不是標準的 YouTube 網址，請再確認一次喔！');
    }
};

// 🎯 乾淨版：只有真正用滑鼠點擊按鈕時，才把 Monica 的摘要抓進來
document.getElementById('btn-import-ai').onclick = async function() {
    try {
        const text = await navigator.clipboard.readText();
        if (!text) return alert('剪貼簿空空的，請先在 Monica 複製重點喔！');
        document.getElementById('aiSummary').value = text;
        showToast('🤖 Monica AI 摘要已成功匯入！');
    } catch (err) {
        alert('無法讀取剪貼簿，請用 Ctrl + V 手動貼入粉紅框框喔。');
    }
};


// 🎯 升級版：儲存影片筆記，同時綁定分類資料夾
document.getElementById('btn-save-video').onclick = function() {
    const manualNotes = document.getElementById('videoNotes').value.trim();
    const aiNotes = document.getElementById('aiSummary').value.trim();
    const folderSelect = document.getElementById('videoFolderSelect');
    const selectedFolder = folderSelect.value || "未分類影片";
    
    let notes = "";
    if (manualNotes) notes += `【手寫筆記】\n${manualNotes}`;
    if (aiNotes) notes += (notes ? "\n\n" : "") + `${aiNotes}`; // 直接融合 AI 摘要
    if (!notes) return alert("請先輸入或匯入筆記內容再儲存喔！");

    // 讀取現有影片紀錄
    let videoData = JSON.parse(localStorage.getItem('videoNotes') || '[]');
    
    // 存入新物件，包含資料夾欄位
    videoData.push({
        id: Date.now(),
        title: "精選學習影片",
        notes: notes,
        folder: selectedFolder,
        date: new Date().toLocaleDateString()
    });
    
    localStorage.setItem('videoNotes', JSON.stringify(videoData));

function renderVideoProgress() {
    const container = document.getElementById('videoProgressList');
    if (!container) return;
    
    const videoData = JSON.parse(localStorage.getItem('videoNotes') || '[]');
    const folderSelect = document.getElementById('videoFolderSelect');
    
    // 🎯 這裡直接換成你專屬的科目名單！加入了【AI】和【大二語音學】
    let folders = JSON.parse(localStorage.getItem('videoFoldersList'));
    if (!folders || folders.length === 0 || !folders.includes('AI')) {
        folders = ["未分類影片", "AI", "大二語音學", "微積分", "英文聽力","心理學","健康保健","投資","其他"];
        localStorage.setItem('videoFoldersList', JSON.stringify(folders));
    }
    
     // 🎯 補齊後面的對齊語法，下拉選單立刻起死回生！
    if (folderSelect) {
        folderSelect.innerHTML = folders.map(f => `<option value="${f}">${f}</option>`).join('');
    }


    if (videoData.length === 0) {
        container.innerHTML = '<p class="text-xs text-gray-400 text-center py-6 col-span-full">目前影片筆記本空空如也 🎞️</p>';
        return;
    }



    // 2. 依照資料夾群組化資料
    const groups = {};
    folders.forEach(f => groups[f] = []);
    videoData.forEach(item => {
        if (!groups[item.folder]) groups[item.folder] = [];
        groups[item.folder].push(item);
    });

    // 3. 開始組合外觀 HTML
    container.innerHTML = "";
    container.classList.remove('grid');
    container.classList.add('space-y-4');

    for (const folderName in groups) {
        if (groups[folderName].length === 0) continue; // 空資料夾先不顯示

        let cardsHTML = groups[folderName].map((item, idx) => {
            // 用 Regex 把 ** 轉成 HTML 粗體標籤
            let formattedNotes = item.notes.replace(/\*\*(.*?)\*\*/g, '<strong class="text-indigo-900 font-bold">$1</strong>');
            
            return `
                <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm relative space-y-2">
                    <div class="flex justify-between items-center border-b pb-1 pr-16">
                        <span class="text-[10px] bg-rose-50 text-rose-600 px-2 py-0.5 rounded-full font-medium">觀看到：已看完此單元</span>
                        <span class="text-[10px] text-gray-400">${item.date}</span>
                    </div>
                    
                    <div class="absolute top-2 right-2 flex gap-2">
                        <button onclick="editVideoNote(${item.id})" class="text-gray-400 hover:text-indigo-600 transition text-xs" title="編輯筆記">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button onclick="deleteVideoNote(${item.id})" class="text-gray-400 hover:text-red-500 transition text-xs" title="刪除筆記">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>

                    <div class="text-xs text-gray-700 leading-relaxed whitespace-pre-wrap break-words">${formattedNotes}</div>
                </div>
            `;
        }).join('');

        // 漂亮的摺疊資料夾結構，並在右側加入「刪除整個資料夾」按鈕
        container.innerHTML += `
            <details open class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                <summary class="bg-rose-50/40 px-4 py-2 font-semibold text-gray-700 text-xs flex justify-between items-center cursor-pointer select-none">
                    <span><i class="fa-solid fa-folder text-rose-400 mr-1"></i> ${folderName}</span>
                    <div class="flex items-center gap-3">
                        <span class="bg-rose-200 text-rose-800 px-2 py-0.5 rounded-full text-[10px]">${groups[folderName].length} 個影片筆記</span>
                        ${folderName !== '未分類影片' ? `
                            <button onclick="event.stopPropagation(); deleteVideoFolder('${folderName}')" class="text-gray-400 hover:text-red-500 transition text-xs" title="刪除此資料夾">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        ` : ''}
                    </div>
                </summary>
                <div class="p-3 border-t border-gray-100 bg-gray-50/50 grid grid-cols-1 md:grid-cols-2 gap-3">
                    ${cardsHTML}
                </div>
            </details>
        `;
    }
}

// 🎯 6. 編輯影片筆記核心功能
window.editVideoNote = function(id) {

// 🎯 7. 刪除影片資料夾功能（安全機制：筆記會自動移轉，不丟失）
window.deleteVideoFolder = function(folderName) {
    if (!confirm(`📁 確定要刪除資料夾【${folderName}】嗎？\n別擔心！裡面的影片筆記會自動移至【未分類影片】安全保留。`)) return;

    let folders = JSON.parse(localStorage.getItem('videoFoldersList') || '[]');
    folders = folders.filter(f => f !== folderName);
    localStorage.setItem('videoFoldersList', JSON.stringify(folders));

    let videoData = JSON.parse(localStorage.getItem('videoNotes') || '[]');
    videoData = videoData.map(item => {
        if (item.folder === folderName) item.folder = "未分類影片";
        return item;
    });
    localStorage.setItem('videoNotes', JSON.stringify(videoData));

    renderVideoProgress();
};

function renderNotes() {
    const f = foldersData.find(folder => folder.id === currentFolderId);

document.getElementById('btn-save-note').onclick = function() {
    const title = document.getElementById('noteTitle').value.trim();
    const content = document.getElementById('noteContent').value.trim();
    const fileInput = document.getElementById('notePdfFile');
    
    if(!title) return alert('請填寫標題');
    
    const f = foldersData.find(folder => folder.id === currentFolderId);
    if (!f.notes) f.notes = [];
    
    const newNote = { title, content, pdfData: null };

    if (fileInput.files && fileInput.files[0]) {
        const file = fileInput.files[0];
        if (file.size > 2 * 1024 * 1024) {
            return alert('講義檔案太大了！請上傳 2MB 以內的 PDF，以免瀏覽器快取爆掉。');
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            newNote.pdfData = e.target.result;
            saveAndRefreshNote(f, newNote);
        };
        reader.readAsDataURL(file);
    } else {
        saveAndRefreshNote(f, newNote);
    }
};

function saveAndRefreshNote(folder, newNote) {
    folder.notes.unshift(newNote);
    localStorage.setItem('hub_folders_data', JSON.stringify(foldersData));
    
    renderNotes();
    
    document.getElementById('noteTitle').value = '';
    document.getElementById('noteContent').value = '';
    document.getElementById('notePdfFile').value = '';
    document.getElementById('addNoteModal').classList.add('hidden');
    showToast('📝 筆記與講義儲存成功！');
}

function openPdf(base64Data) {
    const byteCharacters = atob(base64Data.split(',')[1]);
    const byteNumbers = new Array(byteCharacters.length);
    for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
    }
    const byteArray = new Uint8Array(byteNumbers);
    const blob = new Blob([byteArray], {type: 'application/pdf'});
    const blobUrl = URL.createObjectURL(blob);
    window.open(blobUrl, '_blank');
}

function deleteNote(idx) {
    const f = foldersData.find(folder => folder.id === currentFolderId);
    f.notes.splice(idx, 1);
    localStorage.setItem('hub_folders_data', JSON.stringify(foldersData));
    renderNotes();
}

// ------ 閃卡測驗系統 ------
let fcPool = [];
let fcIdx = 0;

function initFlashcards() {
    fcPool = [...wordsData];
    if(fcPool.length === 0) {
        document.getElementById('fc-start').innerHTML = `<p class="text-gray-400 text-sm">單字本還沒有任何單字可以測驗喔！</p>`;
        return;
    }
    fcPool.sort((a, b) => (a.nextReviewTime || 0) - (b.nextReviewTime || 0));
    fcIdx = 0;
    document.getElementById('fc-start').classList.add('hidden');
    document.getElementById('fc-card').classList.remove('hidden');
    showFlashcard();
}

document.getElementById('btn-fc-all').onclick = () => initFlashcards();

function showFlashcard() {
    document.getElementById('fc-zh').classList.add('hidden');
    const wData = fcPool[fcIdx];
    document.getElementById('fc-progress').innerText = `進度: ${fcIdx + 1} / ${fcPool.length} (當前階段: ${wData.stage || 0})`;
    document.getElementById('fc-word').innerText = wData.word;
    document.getElementById('fc-zh').innerText = "可點擊卡片直接開啟奇摩字典查詞";
}

document.getElementById('fc-area').onclick = function() {
    document.getElementById('fc-zh').classList.remove('hidden');
    openDictionary(fcPool[fcIdx].word);
};

document.getElementById('btn-fc-right').onclick = function() {
    handleFlashcardResult(true);
};

document.getElementById('btn-fc-wrong').onclick = function() {
    handleFlashcardResult(false);
};

function handleFlashcardResult(isCorrect) {
    const currentWord = fcPool[fcIdx];
    const masterIdx = wordsData.findIndex(w => w.word === currentWord.word && w.date === currentWord.date);
    
    if (masterIdx !== -1) {
        let wordItem = wordsData[masterIdx];
        if (!wordItem.stage) wordItem.stage = 0;
        
        if (isCorrect) {
            wordItem.stage = Math.min(wordItem.stage + 1, INTERVALS.length);
        } else {
            wordItem.stage = 1;
        }
        
        const delay = INTERVALS[wordItem.stage - 1] || INTERVALS[INTERVALS.length - 1];
        wordItem.nextReviewTime = Date.now() + delay;
        
        localStorage.setItem('hub_words_data', JSON.stringify(wordsData));
        scheduleNotification(wordItem.word, delay);
    }
    
    nextFlashcard();
}

function nextFlashcard() {
    fcIdx++;
    if(fcIdx < fcPool.length) {
        showFlashcard();
    } else {
        renderWords();
        document.getElementById('fc-card').classList.add('hidden');
        document.getElementById('fc-start').classList.remove('hidden');
        document.getElementById('fc-start').innerHTML = `<p class="text-green-600 font-bold mb-2">🎉 本輪複習完成！遺忘曲線排程已更新。</p><button onclick="initFlashcards()" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-xs">再考一次</button>`;
    }
}

    list.innerHTML = '';

        if (!f.notes) return;
        
        f.notes.forEach((n, idx) => {
            const titleText = n.title.toLowerCase();
            const contentText = n.content.toLowerCase();

                foundCount++;
                
                const pdfButtonHtml = n.pdfData ? `
                    <button onclick="openPdf('${n.pdfData}')" class="mt-2 inline-flex items-center gap-1 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-2.5 py-1 rounded text-[11px] font-semibold transition">
                        <i class="fa-solid fa-file-pdf"></i> 開啟附加講義 PDF
                    </button>
                ` : '';

                let displayContent = n.content;
                const trimmedContent = n.content ? n.content.trim() : '';
                if (trimmedContent.startsWith('http://') || trimmedContent.startsWith('https://')) {
                    displayContent = `<a href="${trimmedContent}" target="_blank" class="text-indigo-600 hover:text-indigo-800 underline font-semibold break-all inline-flex items-center gap-1 bg-indigo-50 px-2 py-1 rounded mt-1 transition hover:bg-indigo-100"><i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i> 開啟課程外部連結</a>`;
                }
                
                list.innerHTML += `
                    <div class="bg-gray-50 border rounded-xl p-3 text-xs relative shadow-sm mb-3">
                        <div class="absolute top-3 right-3 flex items-center gap-2">
                            <span class="text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-medium">📁 ${f.name}</span>
                        </div>
                        <h4 class="font-bold text-gray-800 text-sm mb-1">${n.title}</h4>
                        <p class="text-gray-600 whitespace-pre-wrap">${displayContent}</p>
                        ${pdfButtonHtml}
                    </div>
                `;
            }
        });
    });
    
    if (foundCount === 0) {
        list.innerHTML = '<p class="text-xs text-gray-400 text-center py-10">找不到任何符合關鍵字的講義或連結 🥲</p>';
    }
};// 🎒 執行全站 LocalStorage 打包複製
function exportAllData() {
    try {
        const packet = {
            words: localStorage.getItem('hub_words_data') || '[]',
            folders: localStorage.getItem('hub_folders_data') || '[]',
            timestamp: new Date().getTime()
        };
        const jsonString = JSON.stringify(packet);
        navigator.clipboard.writeText(jsonString).then(() => {
            alert('🎒 打包成功！全站單字與資料夾已複製到你的剪貼簿。\n請趕快去貼到雲端硬碟或記事本存起來！');
        }).catch(err => {
            alert('複製失敗，請手動複製這串文字：' + jsonString);
        });
    } catch (e) {
        alert('打包出錯了：' + e.message);
    }
}

// 📥 執行全站 LocalStorage 貼上還原
function importAllData() {
    const rawData = prompt('📥 請貼上你之前打包的資料字串：');
    if (!rawData) return;
    try {
        const packet = JSON.parse(rawData);
        if (packet.words) localStorage.setItem('hub_words_data', packet.words);
        if (packet.folders) localStorage.setItem('hub_folders_data', packet.folders);
        alert('🎉 還原成功！網頁即將重新整理，迎回你的單字大軍！');
        window.location.reload(); 
    } catch (e) {
        alert('❌ 還原失敗！請確認貼上的資料是否完整且正確。');
    }
}
